<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Mikhael Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
        }

        header {
            background: #020617;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        header h1 {
            color: #38bdf8;
        }

        section {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            border-radius: 15px;
            width: 300px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #38bdf8;
        }

        img {
            width: 100px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .skills span {
            display: inline-block;
            background: #38bdf8;
            color: black;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #020617;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>
    <h1>Website Mikhael 🚀</h1>
</header>

<section>
    <div class="card">
        <img src="https://via.placeholder.com/100">
        <h2>Mikhael</h2>
        <p>Pelajar | Suka bola ⚽ | Belajar coding</p>
    </div>
</section>

<section>
    <div class="card">
        <h2>Tentang Saya</h2>
        <p>Saya sedang belajar membuat website dan ingin jadi developer profesional.</p>
    </div>
</section>

<section>
    <div class="card">
        <h2>Skill</h2>
        <div class="skills">
            <span>HTML</span>
            <span>CSS</span>
            <span>Trading</span>
            <span>Football</span>
        </div>
    </div>
</section>

<section>
    <div class="card">
        <h2>Kontak</h2>
        <p>Instagram: @username</p>
    </div>
</section>

<footer>
    <p>© 2026 Mikhael</p>
</footer>

</body>
</html>
